<div class="popout-container" *ngIf="tile">
  <div class="tile-card">
    <div class="card-icon">{{ tile.icon }}</div>
    <h3>{{ tile.title }}</h3>
    <p>{{ tile.description }}</p>
  </div>
  <input
    type="text"
    class="tile-input"
    [ngModel]="inputText"
    (ngModelChange)="onInputChange($event)"
    placeholder="Enter query...">
</div>

<div class="popout-container error" *ngIf="!tile">
  <p>Unknown tile</p>
</div>
