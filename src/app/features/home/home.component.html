<div class="home-container">
  <!-- Header -->
  <div class="header">
    <h1>Popout - A Basic Framework</h1>
    <p class="subtitle">Explore data across multiple domains</p>
  </div>

  <!-- Domains -->
  <div class="domains-section">
    <div class="domain-grid">
      <div class="domain-card-container" *ngFor="let tile of tiles">
        <!-- Placeholder when popped out -->
        <div class="placeholder" *ngIf="isPoppedOut(tile.id)">
          <span>{{ tile.title }}</span>
        </div>

        <!-- Active card -->
        <a class="domain-card" *ngIf="!isPoppedOut(tile.id)" (click)="openPopOut(tile)">
          <div class="card-icon">{{ tile.icon }}</div>
          <h3>{{ tile.title }}</h3>
          <p>{{ tile.description }}</p>
        </a>

        <input
          type="text"
          class="domain-input"
          [ngModel]="tileInputs[tile.id]"
          (ngModelChange)="onInputChange(tile.id, $event)"
          placeholder="Enter query...">
      </div>
    </div>
  </div>

</div>
