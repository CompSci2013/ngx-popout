<!-- Global Toast Notifications -->
<p-toast key="app-toast" position="top-right"></p-toast>

<!-- Navigation Banner (hidden in popout) -->
<header class="app-header" *ngIf="!isPopout">
  <a routerLink="/" class="home-link">🏠 Home</a>
</header>

<!-- Application Content -->
<main class="app-content" [class.with-chrome]="!isPopout">
  <router-outlet></router-outlet>
</main>

<!-- Footer Bar (hidden in popout) -->
<footer class="app-footer" *ngIf="!isPopout">
  <span class="copyright">© 2026 popout</span>
</footer>
